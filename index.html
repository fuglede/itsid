<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itsid - Thanks for the Laughs!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>≡</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .lander {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .lander__logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .lander__logo svg {
      width: 48px;
      height: 48px;
    }
    .lander__title {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }
    .lander__text {
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .lander__footer {
      margin-top: auto;
      padding: 2rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .lander__footer a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="lander">
    <div>
      <span class="lander__logo">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="6" fill="#4f6df5"/>
          <path d="M8 8h2v12H8V8zm10 0h2v12h-2V8zm-5 0h2v12h-2V8z" fill="#fff"/>
        </svg>
        itsid
      </span>
      <h1 class="lander__title">April 1st Is Over!</h1>
      <p class="lander__text">
        Itsid has officially closed down. Hope you all enjoyed the April Fools' fun! 🎉
      </p>
    </div>
    <footer class="lander__footer">
      <p>Want to revisit the old site? <a href="index2.html">It's still here</a>.</p>
    </footer>
  </div>
</body>
</html>
